  - "Gemini"
  - "Claude"

ai_usage_summary: |
  Used Gemini (Antigravity agent) for code scaffolding, architecture discussion,
  and development workflow. Claude used for code review and optimization.
  All ranking logic was designed and iterated by the human participant.
  No candidate data was fed to any LLM during ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based multi-factor weighted scoring system with explicit honeypot
  detection. Six scoring components: title/career relevance (35%), skills
  match with cross-validation against career history (25%), experience fit
  (15%), behavioral signals from Redrob platform (15%), location/logistics
  (5%), and education (5%). The title/career component is the primary defense
  against keyword-stuffer traps — we check actual job titles and career
  descriptions, not just skill lists. Honeypot detection flags impossible
  profiles (expert skills with zero usage, impossible tenure durations).
  Runtime is ~30 seconds for 100K candidates on CPU.

